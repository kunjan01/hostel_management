{% extends 'base.html' %}
{% block title %}New Complaint{% endblock %}
{% block page_title %}Submit Complaint{% endblock %}
{% block content %}
<div class="page-header"><h1>Submit a Complaint</h1><p>Lodge a new complaint or maintenance request</p></div>
<div style="max-width:640px;">
<div class="card">
    <div class="card-header"><i class="fas fa-circle-exclamation me-2" style="color:var(--warning);"></i>Complaint Details</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Student *</label>
                    <select name="student" class="form-select" required>
                        <option value="">-- Select Student --</option>
                        {% for s in students %}<option value="{{ s.pk }}">{{ s.name }} ({{ s.enrollment_no }})</option>{% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Category *</label>
                    <select name="category" class="form-select" required>
                        <option value="Room">Room Issue</option>
                        <option value="Mess">Mess Issue</option>
                        <option value="Water">Water Supply</option>
                        <option value="Electricity">Electricity</option>
                        <option value="WiFi">WiFi Issue</option>
                        <option value="Cleanliness">Cleanliness</option>
                        <option value="Security">Security</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Subject *</label>
                    <input type="text" name="subject" class="form-control" required placeholder="Brief description of the issue">
                </div>
                <div class="col-12">
                    <label class="form-label">Description *</label>
                    <textarea name="description" class="form-control" rows="4" required placeholder="Detailed description of the problem..."></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Priority *</label>
                    <select name="priority" class="form-select" required>
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                        <option value="Critical">Critical</option>
                    </select>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane me-2"></i>Submit Complaint</button>
                <a href="{% url 'complaint_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
