{% extends 'base.html' %}

{% block auth_content %}
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background: var(--bg-primary); position:relative; overflow:hidden;">
    <!-- Background blobs -->
    <div style="position:absolute; top:-200px; left:-200px; width:500px; height:500px; background:radial-gradient(circle, rgba(79,142,247,0.06), transparent); border-radius:50%;"></div>
    <div style="position:absolute; bottom:-200px; right:-100px; width:400px; height:400px; background:radial-gradient(circle, rgba(124,92,191,0.06), transparent); border-radius:50%;"></div>

    <div style="width:100%; max-width:420px; padding: 24px;">
        <!-- Logo -->
        <div style="text-align:center; margin-bottom:32px;">
            <div style="width:60px; height:60px; background:linear-gradient(135deg, var(--accent), var(--accent-2)); border-radius:16px; display:inline-flex; align-items:center; justify-content:center; font-size:26px; color:white; margin-bottom:16px; box-shadow: 0 8px 32px rgba(79,142,247,0.25);">
                <i class="fas fa-building"></i>
            </div>
            <h1 style="font-size:24px; font-weight:800; margin-bottom:6px;">HMS Portal</h1>
            <p style="color:var(--text-secondary); font-size:13px;">Hostel & Mess Management System</p>
        </div>

        <!-- Card -->
        <div style="background:var(--bg-card); border:1px solid var(--border); border-radius:16px; padding:28px;">
            <h2 style="font-size:18px; font-weight:700; margin-bottom:6px;">Sign in</h2>
            <p style="color:var(--text-secondary); font-size:13px; margin-bottom:24px;">Enter your credentials to continue</p>

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} mb-3" style="font-size:13px;">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div style="position:relative;">
                        <i class="fas fa-user" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:13px;"></i>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required style="padding-left:36px;">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div style="position:relative;">
                        <i class="fas fa-lock" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:13px;"></i>
                        <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Enter password" required style="padding-left:36px; padding-right:40px;">
                        <i class="fas fa-eye" id="togglePwd" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:13px; cursor:pointer;"></i>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="padding:10px; font-size:14px; font-weight:700; border-radius:10px;">
                    <i class="fas fa-right-to-bracket me-2"></i>Sign In
                </button>
            </form>
        </div>

        <p style="text-align:center; color:var(--text-muted); font-size:12px; margin-top:20px;">
            Default admin: <code style="color:var(--accent); font-family:'JetBrains Mono';">admin / admin123</code>
        </p>
    </div>
</div>
<script>
document.getElementById('togglePwd').addEventListener('click', function() {
    const input = document.getElementById('passwordInput');
    if (input.type === 'password') {
        input.type = 'text';
        this.className = 'fas fa-eye-slash';
    } else {
        input.type = 'password';
        this.className = 'fas fa-eye';
    }
    this.style.cssText = 'position:absolute; right:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:13px; cursor:pointer;';
});
</script>
{% endblock %}
