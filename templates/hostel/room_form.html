{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header"><h1>{{ title }}</h1><p>Configure room details</p></div>
<div style="max-width:700px;">
<div class="card">
    <div class="card-header"><i class="fas fa-door-open me-2" style="color:var(--accent);"></i>Room Information</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6"><label class="form-label">Block *</label>
                    <select name="block" class="form-select" required>
                        <option value="">-- Select Block --</option>
                        {% for block in blocks %}<option value="{{ block.pk }}">Block {{ block.name }} ({{ block.block_type }})</option>{% endfor %}
                    </select>
                </div>
                <div class="col-md-6"><label class="form-label">Room Number *</label><input type="text" name="room_number" class="form-control" required placeholder="e.g. 101, A-201"></div>
                <div class="col-md-4"><label class="form-label">Floor *</label><input type="number" name="floor" class="form-control" value="1" min="1" required></div>
                <div class="col-md-4"><label class="form-label">Room Type *</label>
                    <select name="room_type" class="form-select" required>
                        <option value="Single">Single Occupancy</option>
                        <option value="Double" selected>Double Occupancy</option>
                        <option value="Triple">Triple Occupancy</option>
                        <option value="Dormitory">Dormitory</option>
                    </select>
                </div>
                <div class="col-md-4"><label class="form-label">Capacity *</label><input type="number" name="capacity" class="form-control" value="2" min="1" max="20" required></div>
                <div class="col-md-6"><label class="form-label">Monthly Rent (₹) *</label><input type="number" name="monthly_rent" class="form-control" value="3000" min="0" step="100" required></div>
                <div class="col-12">
                    <label class="form-label">Amenities</label>
                    <div class="d-flex gap-4">
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="has_ac" id="ac"><label class="form-check-label" for="ac">Air Conditioning ❄️</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="has_wifi" id="wifi" checked><label class="form-check-label" for="wifi">WiFi 📶</label></div>
                        <div class="form-check"><input class="form-check-input" type="checkbox" name="has_attached_bathroom" id="bath"><label class="form-check-label" for="bath">Attached Bathroom 🚿</label></div>
                    </div>
                </div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Save Room</button>
                <a href="{% url 'room_list' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
