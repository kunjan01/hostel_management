{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header"><h1>{{ title }}</h1><p>Configure a new hostel block</p></div>
<div style="max-width:640px;">
    <div class="card">
        <div class="card-header"><i class="fas fa-city me-2" style="color:var(--accent);"></i>Block Details</div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Block Name *</label><input type="text" name="name" class="form-control" required placeholder="e.g. A, B, Boys Wing 1"></div>
                    <div class="col-md-6"><label class="form-label">Block Type *</label>
                        <select name="block_type" class="form-select" required>
                            <option value="Boys">Boys</option>
                            <option value="Girls">Girls</option>
                            <option value="Mixed">Mixed</option>
                        </select>
                    </div>
                    <div class="col-md-6"><label class="form-label">Number of Floors *</label><input type="number" name="floors" class="form-control" value="1" min="1" max="20" required></div>
                    <div class="col-md-6"><label class="form-label">Warden Name</label><input type="text" name="warden_name" class="form-control" placeholder="Optional"></div>
                    <div class="col-md-6"><label class="form-label">Warden Phone</label><input type="text" name="warden_phone" class="form-control" placeholder="Optional"></div>
                    <div class="col-12"><label class="form-label">Description</label><textarea name="description" class="form-control" rows="2" placeholder="Optional notes..."></textarea></div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Save Block</button>
                    <a href="{% url 'block_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
